#mybatis
mybatis:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.yy.ppm.bean
  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true
#mybatis-plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  typeAliasesPackage: com.yy.ppm.**.model
  configuration:
    mapUnderscoreToCamelCase: true
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'

#cros
cros:
  config:
    pathPattern: /**
    origins: '*'
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    exposedHeaders:
      - token
      - content-disposition
    allowHeaders:
      - token
      - content-disposition
      - x-requested-with
    maxAge: 86400
    allowCredentials: true

# Swagger配置 add by yy
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api
  # 项目相关配置
  project:
    # 名称
    name: 济南扬奕Java开发平台V1.0
    # 版本
    version: 1.0.0
    # 版权年份
    copyrightYear: 2023
    #作者
    contact: 济南扬奕软件开发有限公司

