#druid
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    # 动态数据源文档 https://www.kancloud.cn/tracy5546/dynamic-datasource/content
    dynamic:
      # 性能分析插件(有性能损耗 不建议生产环境使用)
      p6spy: false
      # 设置默认的数据源或者数据源组,默认值即为 master
      primary: master
      # 严格模式 匹配不到数据源则报错
      strict: true
      datasource:
        # 主库数据源
        master:
          driverClassName: oracle.jdbc.OracleDriver
          # jdbc 所有参数配置参考 https://lionli.blog.csdn.net/article/details/122018562
          # rewriteBatchedStatements=true 批处理优化 大幅提升批量插入更新删除性能(对数据库有性能损耗 使用批量操作应考虑性能问题)
          username: WFG_PORTMIS_TEST
          password: Wfg@1018
          url: jdbc:oracle:thin:@//172.18.2.6:1521/sdgswfg
        # 过磅
        #        simeauto:
        #          driverClassName: com.microsoft.sqlserver.jdbc.SQLServerDriver
        #          url: jdbc:sqlserver://172.29.61.99:1433;database=simeauto;trustServerCertificate=true
        #          username: sa
        #          password: DB@simeauto
        #          druid:
        #            validationQuery: SELECT 1
#        eport:
#          driverClassName: com.microsoft.sqlserver.jdbc.SQLServerDriver
#          url: jdbc:sqlserver://172.29.61.103:1433;database=eport;trustServerCertificate=true
#          username: sa
#          password: Eport@2018
#          druid:
#            validationQuery: SELECT 1
      druid:
        # 初始连接数
        initialSize: 5
        # 最小连接池数量
        minIdle: 10
        # 最大连接池数量
        maxActive: 20
        # 配置获取连接等待超时的时间
        maxWait: 60000
        # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
        timeBetweenEvictionRunsMillis: 60000
        # 配置一个连接在池中最小生存的时间，单位是毫秒
        minEvictableIdleTimeMillis: 300000
        # 配置一个连接在池中最大生存的时间，单位是毫秒
        maxEvictableIdleTimeMillis: 900000
        # 配置检测连接是否有效 避免 mysql空闲8小时断开连接
        #        validationQuery: SELECT 1
        #        testWhileIdle: true
        #        testOnBorrow: false
        #        testOnReturn: false
        # 注意这个值和druid原生不一致，默认启动了stat
        filters: stat
