#basic
server:
  port: 9092
  servlet:
    context-path: /dev-api

#druid
spring:
  datasource:
    dynamic:
      # 是否开启 P6Spy 性能分析（开发环境可开启）
      p6spy: false
      # 默认数据源
      primary: master
      # 严格模式：找不到数据源时抛出异常
      strict: true

      datasource:
        # 主数据源 - MySQL
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          username: root
          password: rever168
          url: jdbc:mysql://123.207.147.75:3306/yy_framework?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

        # 第二个数据源（可选）
        bhtnewdb:
          driver-class-name: com.mysql.cj.jdbc.Driver
          username: root
          password: rever168
          url: jdbc:mysql://123.207.147.75:3306/yy_framework?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

      # Druid 连接池配置
      druid:
        initialSize: 32
        minIdle: 32
        maxActive: 128
        maxWait: 15000
        timeBetweenEvictionRunsMillis: 3000
        minEvictableIdleTimeMillis: 300000
        maxEvictableIdleTimeMillis: 900000
        filters: stat
        # MySQL 健康检查语句
        validation-query: SELECT 1
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 120MB #单个文件最大大小
      max-request-size: 500MB #上传数据总大小
  application:
    name: dev-api

  quartz:
    job-store-type: jdbc
    # 全局启用或者关闭quartz
    enabled: false
    data-source: masterDataSource
    jdbc:
      initialize-schema: never # 若未创建qrtz_表，首次可改为always，创建后改回never
    # 关闭项目时是否等待正在执行的任务完成（避免任务中断）
    wait-for-jobs-to-complete-on-shutdown: true
    # 是否覆盖已存在的任务配置
    overwrite-existing-jobs: true
    properties:
      org:
        quartz:
          # 2. 新增：配置Quartz数据源（masterDataSource）的连接信息（与你的master数据源一致）
          dataSource:
            masterDataSource:
              driver: com.mysql.cj.jdbc.Driver # 与master的driver-class-name一致
              URL: jdbc:mysql://123.207.147.75:3306/yy_framework?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true # 与master的url一致
              user: root # 与master的username一致
              password: rever168 # 与master的password一致
              maxConnections: 30 # 数据源最大连接数（建议与Druid的maxActive匹配，你的Druid是128，这里可设30-50）
          scheduler:
            instanceName: BusinessScheduler
            instanceId: AUTO
          threadPool:
            threadCount: 10
            threadPriority: 5
            class: org.quartz.simpl.SimpleThreadPool
          jobStore:
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            useProperties: false
            tablePrefix: qrtz_
            isClustered: true
            clusterCheckinInterval: 20000
            misfireThreshold: 60000
            # 3. 保留：指定JobStore使用的数据源名称（必须与上方dataSource的key一致：masterDataSource）
            dataSource: masterDataSource

  data:
    redis:
      client-name: bdss-redis
      database: 4
      host: 123.207.147.75
      password: yyRever168.com!#@
      port: 6379
      timeout: 3000ms
      lettuce:
        shutdown-timeout: 2000ms
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 200ms
          time-between-eviction-runs-millis: 120000
  rabbitmq:
    producer:
      virtual-host: yangyi-eport
      host: 114.55.226.181
      port: 5672
      username: yangyi
      password: "Rever168@"

    # 消费者配置（支持连接多个RabbitMQ服务器）
    consumers:
      - server-id: rabbit-server-1  # 第一台服务器唯一标识
        virtual-host: yangyi-eport
        host: 114.55.226.181
        port: 5672
        username: yangyi
        password: "Rever168@"
        listener:
          concurrency: 10
          max-concurrency: 20
          acknowledge-mode: manual  # 手动确认模式（必填）

        exchanges: # 该服务器下的交换机配置
          - name: rabbitmq测试
            type: direct  # 交换机类型（direct/topic/fanout/headers）

        queues: # 该服务器下的队列配置
          - name: 测试_queues
            routing-key: exchange_cs
            exchange: rabbitmq测试  # 关联的交换机名称
            enabled: true  # 启用监听
#mybatis-plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml  # MySQL 专属 Mapper 路径
  typeAliasesPackage: com.yy.ppm.**.model  # 实体类别名扫描路径（保持不变）
  configuration:
    mapUnderscoreToCamelCase: true  # 下划线转驼峰（保持不变）
    call-setters-on-nulls: true  # 空值返回字段（保持不变）
    jdbc-type-for-null: 'null'  # 空值的 JDBC 类型（保持不变）

#cros
cros:
  config:
    pathPattern: /**
    origins: '*'
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    exposedHeaders:
      - token
      - content-disposition
    allowHeaders:
      - token
      - content-disposition
      - x-requested-with
    maxAge: 86400
    allowCredentials: true

# Swagger配置 add by yy
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api
  # 项目相关配置
  project:
    # 名称
    name: 济南扬奕Java开发平台V1.0
    # 版本
    version: 1.0.0
    # 版权年份
    copyrightYear: 2023
    #作者
    contact: 济南扬奕软件开发有限公司

#扬奕云配置参数
yy:
  #token过期时间
  token:
    expires: 480
  mqSwitch: 1
  whiteList:
