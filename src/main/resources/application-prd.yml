  health:
    rabbit:
      enabled: false
#Dify配置
dify:
  url: http://114.215.173.72:10005/v1
  key: app-oUrmwL25BFYxsjUm3AK65q5d

#pagehelper
pagehelper:
  reasonable: true
  #分页插件会自动检测当前的数据库链接，自动选择合适的分页方式
  auto-dialect: true
