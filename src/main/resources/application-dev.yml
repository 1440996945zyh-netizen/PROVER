  level:
    com.yy.ppm.mappers: debug

deploy:
  env: dev


management:
  endpoints:
    web:
      exposure:
        include: health,info,env,metrics
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false

#pagehelper
pagehelper:
  reasonable: true
  #分页插件会自动检测当前的数据库链接，自动选择合适的分页方式
  auto-dialect: true
  #默认值为 false。设置为 true 时，允许在运行时根据多数据源自动识别对应方言的分页
  auto-runtime-dialect: true

