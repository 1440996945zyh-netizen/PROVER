image: maven:3-eclipse-temurin-17

variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
  GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
#  GIT_CLEAN_FLAGS: none #解决长路径问题可以先放开，但是运行第二次的时候必须注释，否则不会更新代码
  SONAR_HOST_URL: "http://114.55.226.181:9002"
  SONAR_PROJECT_KEY: "yy-framework_yy-framework-api_85325cdb-89a9-4d80-86d4-66be8c9c646d"         # 必须写你的项目key
  SONAR_TOKEN: "sqp_9ae93907f74c7ca4fcbede512e997c7f5ec2c279"

stages:
  - build-sonar


build-sonar:
  stage: build-sonar

  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - ".sonar/cache"
      - sonar-scanner/
  script:
    # PowerShell 正确进入项目目录（使用 $env:CI_PROJECT_DIR）
    - cd $env:CI_PROJECT_DIR
    - echo "SONAR_HOST_URL=$env:SONAR_HOST_URL"  # 添加这行查看实际值（未打印，可能是runner的问题）
    - cd D:/gitlab-runner/builds/UUZGLxcD_/0/gitlab2/yy-framework/yy-framework-api
    - mvn verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar "-Dsonar.host.url=$env:SONAR_HOST_URL" "-Dsonar.projectKey=$env:SONAR_PROJECT_KEY" "-Dsonar.login=$env:SONAR_TOKEN" "-Dsonar.java.binaries=target/classes"
    #可能是runner的问题，${}取不到值，先写死
  #    - mvn verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar "-Dsonar.host.url=http://114.55.226.181:9002" "-Dsonar.projectKey=yy-framework_yy-framework-api_85325cdb-89a9-4d80-86d4-66be8c9c646d" "-Dsonar.login=sqp_9ae93907f74c7ca4fcbede512e997c7f5ec2c279" "-Dsonar.java.binaries=target/classes"
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'master'
    - if: $CI_COMMIT_BRANCH == 'main'
    - if: $CI_COMMIT_BRANCH == 'develop'
