variables:
  GIT_DEPTH: "0"

stages:
  - build-sonar

build-sonar:
  stage: build-sonar
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - ".sonar/cache"

  script:
    - cd D:/gitlab-runner/builds/UUZGLxcD_/0/gitlab2/yy-framework/yy-framework-api
    # 最简单、最安全、Windows Runner 100% 不报错
    - mvn clean verify sonar:sonar -Dsonar.host.url=$env:SONAR_HOST_URL -Dsonar.projectKey=yy-framework_yy-framework-api -Dsonar.login=$env:SONAR_TOKEN -Dsonar.java.binaries=target/classes

  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
