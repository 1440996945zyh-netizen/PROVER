variables:
  GIT_DEPTH: "0"

stages:
  - build-sonar

build-sonar:
  stage: build-sonar
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - ".sonar/cache"

  script:
    # 使用 PowerShell 原生语法，不调用 cmd /c
    - |
      # 从 GitLab file 类型变量中读取真实值
      $sonarHostUrl = (Get-Content $env:SONAR_HOST_URL -Raw).Trim()
      $sonarToken = (Get-Content $env:SONAR_TOKEN -Raw).Trim()
      
      # 可选：输出调试信息（注意 token 不要完整打印，仅用于确认长度）
      Write-Host "SonarQube URL: $sonarHostUrl"
      Write-Host "SonarQube Token length: $($sonarToken.Length)"
      
      # 切换到项目目录（建议使用 GitLab 预定义变量，避免硬编码）
      $projectDir = "$env:CI_PROJECT_DIR"
      Set-Location $projectDir
      
      # 执行 Maven 命令，使用读取到的值
      mvn clean verify sonar:sonar `
        -Dsonar.host.url="$sonarHostUrl" `
        -Dsonar.login="$sonarToken" `
        -Dsonar.java.binaries=target/classes
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
