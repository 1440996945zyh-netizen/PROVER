variables:
  GIT_DEPTH: "0"

stages:
  - build-sonar

build-sonar:
  stage: build-sonar
  cache:
    policy: pull-push
    key: "sonar-cache-%CI_COMMIT_REF_SLUG%"
    paths:
      - ".sonar/cache"
  script:
    # 从 file 类型变量中读取真实值
    - set /p SONAR_HOST_URL=<"%SONAR_HOST_URL%"
    - set /p SONAR_TOKEN=<"%SONAR_TOKEN%"
    # 可选：打印调试信息（注意 token 只打印长度）
    - echo SonarQube URL: %SONAR_HOST_URL%
    - echo SonarQube Token length: %SONAR_TOKEN:~0,1%*** (only first char shown)
    # 进入项目目录（使用 GitLab 预定义变量）
    - cd /d "%CI_PROJECT_DIR%"
    # 临时将 Maven 加入 PATH
    - set PATH=D:\apache-maven\bin;%PATH%
    # 执行 Maven 命令（注意：CMD 换行需要使用 ^，这里写在一行更安全）
    - mvn clean verify sonar:sonar -Dsonar.host.url="%SONAR_HOST_URL%" -Dsonar.login="%SONAR_TOKEN%" -Dsonar.java.binaries=target/classes
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
