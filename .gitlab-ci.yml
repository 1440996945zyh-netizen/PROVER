variables:
  GIT_DEPTH: "0"

stages:
  - build-sonar

build-sonar:
  stage: build-sonar
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - ".sonar/cache"

  script:
    # 最简单、最安全、Windows Runner 100% 不报错
    - cmd /c "cd /d D:\gitlab-runner\builds\UUZGLxcD_\0\gitlab2\yy-framework\yy-framework-api && mvn clean verify sonar:sonar -Dsonar.host.url=http://114.55.226.181:9002 -Dsonar.projectKey=yy-framework_yy-framework-api_85325cdb-89a9-4d80-86d4-66be8c9c646d -Dsonar.login=sqp_9ae93907f74c7ca4fcbede512e997c7f5ec2c279 -Dsonar.java.binaries=target/classes"

  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
